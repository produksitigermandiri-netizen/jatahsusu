// REALTIME SUBSCRIPTION
let channels = [];
function subscribeRealtime() {
  // Hapus channel lama
  channels.forEach(ch => ch.unsubscribe());
  channels = [];

  // Karyawan berubah → refresh
  const ch1 = sb.channel('db-karyawan')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'karyawan' }, () => {
      loadKaryawan().then(render);
      showToast('Data karyawan diupdate realtime', 'info');
    })
    .subscribe();

  // Kehadiran berubah → refresh

    .on('postgres_changes', { event: '*', schema: 'public', table: 'kehadiran' }, () => {
      loadKehadiran().then(render);
    })
    .subscribe();

  channels.push(ch1, ch2);
}
