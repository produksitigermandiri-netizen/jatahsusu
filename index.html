<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jatah Karyawan - PT. Tigermandiri Pratama</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f6feb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jatah Karyawan">
  <link rel="apple-touch-icon" href="logo.jpg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK NAVY FIRST ─────────────────────────────────────── */
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #1c2128;
      --bg4:     #21262d;
      --text:    #e6edf3;
      --text2:   #7d8590;
      --text3:   #484f58;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.12);
      --info-bg: rgba(31,111,235,0.12);
      --info:    #4493f8;
      --info2:   #1f6feb;
      --success: #3fb950;
      --danger:  #f85149;
      --radius:  8px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --shadow:    0 4px 16px rgba(0,0,0,.5);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.65);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:      #f6f8fa;
        --bg2:     #ffffff;
        --bg3:     #eaeef2;
        --bg4:     #d8dee4;
        --text:    #1f2328;
        --text2:   #656d76;
        --text3:   #adbac7;
        --border:  rgba(0,0,0,0.08);
        --border2: rgba(0,0,0,0.15);
        --info-bg: #ddf4ff;
        --info:    #0969da;
        --info2:   #0550ae;
        --success: #1a7f37;
        --danger:  #cf222e;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
        --shadow:    0 4px 16px rgba(0,0,0,.1);
        --shadow-lg: 0 12px 40px rgba(0,0,0,.15);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    #app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 14px; }
    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--border2); border-top-color: var(--info); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOPBAR ──────────────────────────────────────────────── */
    .topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .topbar-brand { display: flex; align-items: center; gap: 8px; margin-right: auto; }
    .topbar-brand-icon { width: 28px; height: 28px; background: var(--info2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .topbar-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
    .topbar-meta { display: flex; gap: 6px; align-items: center; margin-right: 4px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn { padding: 0 14px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); white-space: nowrap; font-weight: 500; transition: all .12s; }
    .btn:hover { background: var(--bg3); color: var(--text); }
    .btn.active { background: var(--info2); color: #fff; border-color: var(--info2); font-weight: 600; box-shadow: 0 0 0 3px rgba(31,111,235,.2); }
    .btn.active:hover { opacity: .9; }
    .btn-sm { height: 28px; font-size: 12px; padding: 0 10px; }
    .btn-primary { color: var(--info); border-color: var(--info2); }
    .btn-primary:hover { background: var(--info-bg); color: var(--info); }
    .btn-danger { color: var(--danger); border-color: var(--danger); font-size: 11px; height: 26px; padding: 0 10px; }
    .btn-danger:hover { background: rgba(248,81,73,.1); }
    .btn-block { width: 100%; height: 44px; font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #fff; background: var(--info2); border: none; border-radius: var(--radius); cursor: pointer; transition: all .15s; box-shadow: 0 0 0 0 rgba(31,111,235,.4); }
    .btn-block:hover { background: var(--info); box-shadow: 0 4px 16px rgba(31,111,235,.35); transform: translateY(-1px); }
    .btn-block:active { transform: translateY(0); }

    /* ── HOME ────────────────────────────────────────────────── */
    .home-outer { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; margin: -1.5rem -1rem; }
    .home-wrap { width: 100%; max-width: 420px; }
    .home-brand { text-align: center; margin-bottom: 3rem; }
    .home-brand-icon { width: 72px; height: 72px; background: var(--info2); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 1.25rem; box-shadow: 0 8px 32px rgba(31,111,235,.4), 0 0 0 1px rgba(68,147,248,.2); }
    .home-brand-text h1 { font-size: 24px; font-weight: 800; letter-spacing: -.04em; color: var(--text); }
    .home-brand-text .home-brand-company { font-size: 12px; color: var(--text3); margin-top: 4px; letter-spacing: .04em; text-transform: uppercase; font-weight: 500; }
    .role-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .role-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.25rem 1rem; cursor: pointer; transition: all .15s; box-shadow: var(--shadow-sm); }
    .role-card:hover { border-color: var(--info); background: var(--info-bg); box-shadow: var(--shadow), 0 0 0 1px var(--info); transform: translateY(-2px); }
    .role-icon { width: 38px; height: 38px; background: var(--bg3); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 19px; border: 1px solid var(--border2); }
    .role-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .role-desc { font-size: 11px; color: var(--text2); line-height: 1.5; }
    .sa-link { text-align: center; }
    .sa-link button { background: none; border: none; font-size: 11px; color: var(--text3); cursor: pointer; transition: color .15s; letter-spacing: .02em; }
    .sa-link button:hover { color: var(--text2); }

    /* ── LOGIN ───────────────────────────────────────────────── */
    .login-outer { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; margin: -1.5rem -1rem; }
    .login-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); }
    .login-icon { width: 64px; height: 64px; background: var(--info2); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 1.5rem; box-shadow: 0 8px 24px rgba(31,111,235,.35); }
    .login-card h2 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; letter-spacing: -.04em; color: var(--text); }
    .login-card .sub { font-size: 12px; color: var(--text3); margin-bottom: 2rem; text-align: center; letter-spacing: .02em; text-transform: uppercase; font-weight: 500; }
    .login-divider { height: 1px; background: var(--border); margin-bottom: 2rem; }
    .back-link { margin-top: 1.25rem; text-align: center; }
    .back-link button { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; transition: color .15s; }
    .back-link button:hover { color: var(--text2); }
    .err-msg { font-size: 12px; color: var(--danger); margin: 8px 0; min-height: 18px; text-align: center; }

    /* ── FORMS ───────────────────────────────────────────────── */
    .field { margin-bottom: 1rem; }
    .field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; }
    .field input[type=text], .field input[type=email], .field input[type=password], .field select {
      width: 100%; font-size: 14px; padding: 10px 14px; border-radius: var(--radius);
      border: 1px solid var(--border2); background: var(--bg3); color: var(--text);
      height: 42px; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--info); box-shadow: 0 0 0 3px rgba(68,147,248,.15); background: var(--bg3); }
    .inline-form { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .inline-form .field { margin-bottom: 0; }
    .inline-form .field input[type=text], .inline-form .field select { height: 34px; font-size: 13px; padding: 6px 10px; }
    .check-row { display: flex; align-items: center; gap: 8px; height: 32px; }
    .check-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--info); cursor: pointer; }
    .check-row label { font-size: 13px; color: var(--text); cursor: pointer; font-weight: 400; text-transform: none; letter-spacing: 0; }

    /* ── WEEK NAV ────────────────────────────────────────────── */
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .week-nav span.lbl { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .week-nav span.range { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

    /* ── TABLES ──────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-weight: 600; font-size: 10px; color: var(--text3); text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border2); white-space: nowrap; text-transform: uppercase; letter-spacing: .07em; background: var(--bg3); }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover > td { background: var(--bg3); transition: background .08s; }
    .subtotal td { font-weight: 700; background: var(--bg4); font-size: 12px; }
    .subtotal:hover > td { background: var(--bg4) !important; }
    .cb-cell { text-align: center; }
    .cb-cell input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--info); }
    .num-cell { text-align: center; font-weight: 700; }
    .jatah-head { background: var(--info-bg); color: var(--info); text-align: center; font-size: 11px; font-weight: 700; }
    .jatah-val { text-align: center; font-weight: 700; color: var(--info); }

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; }
    .badge-tiger   { background: rgba(68,147,248,.15); color: var(--info); border: 1px solid rgba(68,147,248,.2); }
    .badge-yayasan { background: rgba(63,185,80,.12); color: var(--success); border: 1px solid rgba(63,185,80,.2); }
    .badge-s1      { background: rgba(68,147,248,.12); color: var(--info); border: 1px solid rgba(68,147,248,.15); }
    .badge-s2      { background: rgba(188,140,255,.12); color: #bc8cff; border: 1px solid rgba(188,140,255,.15); }
    .badge-s3      { background: rgba(227,179,65,.12); color: #e3b341; border: 1px solid rgba(227,179,65,.15); }
    .badge-asm     { background: rgba(63,185,80,.1); color: var(--success); border: 1px solid rgba(63,185,80,.15); }
    .badge-inj     { background: rgba(248,130,74,.12); color: #f8824a; border: 1px solid rgba(248,130,74,.15); }

    /* ── METRIC CARDS ────────────────────────────────────────── */
    .metric-grid { display: grid; gap: 12px; margin-bottom: 2rem; }
    .mc { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; border-top: 2px solid var(--info); box-shadow: var(--shadow-sm); }
    .mc-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; font-weight: 700; }
    .mc-val { font-size: 46px; font-weight: 800; color: var(--info); line-height: 1; letter-spacing: -.05em; }
    .mc-sub { font-size: 11px; color: var(--text3); margin-top: 8px; }

    /* ── SECTION BLOCKS ──────────────────────────────────────── */
    .wc-block { margin-bottom: 2.25rem; }
    .wc-title { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); }
    .divline { flex: 1; height: 1px; background: var(--border2); }
    .sh-block { margin-bottom: 1.25rem; }
    .shift-card { border: 1px solid var(--border); border-left: 3px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; box-shadow: var(--shadow-sm); background: var(--bg2); }
    .shift-card-1 { border-left-color: #4493f8; }
    .shift-card-2 { border-left-color: #bc8cff; }
    .shift-card-3 { border-left-color: #e3b341; }
    .shift-card-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
    .shift-card-head-left { display: flex; align-items: center; gap: 8px; }
    .shift-stats { display: flex; gap: 24px; }
    .sstat { display: flex; flex-direction: column; align-items: center; }
    .sstat-val { font-size: 26px; font-weight: 800; color: var(--info); line-height: 1; letter-spacing: -.04em; }
    .sstat-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }

    /* ── MISC ────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }
    .help { font-size: 11px; color: var(--text3); margin-top: 10px; }
    .slbl { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .875rem; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg4); color: var(--text); border: 1px solid var(--border2); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .install-banner { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-lg); z-index: 998; transition: transform .35s cubic-bezier(.34,1.56,.64,1); min-width: 280px; max-width: 360px; }
    .install-banner.show { transform: translateX(-50%) translateY(0); }
    .install-banner-icon { width: 42px; height: 42px; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
    .install-banner-icon img { width: 100%; height: 100%; object-fit: cover; }
    .install-banner-text { flex: 1; }
    .install-banner-text strong { display: block; font-size: 13px; font-weight: 700; color: var(--text); }
    .install-banner-text span { font-size: 11px; color: var(--text3); }
    .install-banner-btn { background: var(--info2); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; letter-spacing: .04em; }
    .install-banner-btn:hover { background: var(--info); }
    .install-banner-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; border: 1px solid; }
    .alert-info { background: var(--info-bg); color: var(--info); border-color: rgba(68,147,248,.25); }
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="install-banner" id="install-banner">
  <div class="install-banner-icon"><img src="logo.jpg" alt="logo"></div>
  <div class="install-banner-text">
    <strong>Install Jatah Karyawan</strong>
    <span>Tambahkan ke layar utama</span>
  </div>
  <button class="install-banner-btn" id="install-btn">Install</button>
  <button class="install-banner-close" id="install-close">×</button>
</div>

<script>
// ============================================================
// CONFIG — Ganti dengan credentials Supabase project kamu
// ============================================================
const SUPABASE_URL  = 'https://yhyiljuplidjpzhapotk.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeWlsanVwbGlkanB6aGFwb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkwNDAsImV4cCI6MjA5MDY3NTA0MH0.Y8viOJo3K_ptcPQ5el0HtK_JrptRTKymUaNqxOqzrS8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let state = {
  screen: 'loading',  // loading | home | loginMandor | loginSuper | app
  role: null,         // null | operator | mandor | superadmin
  user: null,
  profile: null,
  // mandor scope (from profile)
  mandorWC: '',
  mandorShift: 0,
  mandorNama: '',
  // tabs
  mandorTab: 'hadir',
  adminTab: 'karyawan',
  // data cache
  karyawan: [],
  kehadiran: {},   // { karyawan_id: { week_start: [bool x6] } }
  mandors: [],     // for superadmin user management
  // week
  week: getMonday(new Date()),
  // form
  form: { nama: '', tipe: 'Tiger', shift: '1', lokasi: 'Assembling', susu: true, kopi: false, mie: false },
  mandorForm: { nama: '', email: '', password: '', workcenter: 'Assembling', shift: '1' },
  loginForm: { email: '', password: '', err: '' },
};

// ============================================================
// HELPERS
// ============================================================
function fmtDate(d) {
  // Format local date as YYYY-MM-DD (bukan UTC, hindari timezone shift)
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function getMonday(d) {
  const day = d.getDay(), diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d); m.setDate(d.getDate() + diff);
  return fmtDate(m);
}

function addDays(wk, n) {
  const d = new Date(wk + 'T00:00:00'); d.setDate(d.getDate() + n); return d;
}

function fmt(d) { return d.getDate() + '/' + (d.getMonth() + 1); }

function fmtLong(d) {
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });
}

function wcBadge(wc) { return wc === 'Assembling' ? 'asm' : 'inj'; }

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function getHadir(karId) {
  return state.kehadiran[karId]?.[state.week] || [false,false,false,false,false,false,false];
}

function groupKar(lokasi, shift) {
  return state.karyawan.filter(k => k.lokasi === lokasi && k.shift === shift);
}

function calcG(lokasi, shift) {
  const list = groupKar(lokasi, shift);
  let susu = 0, kopi = 0, mie = 0;
  list.forEach(k => {
    const h = getHadir(k.id), n = h.filter(Boolean).length;
    if (k.dapat_susu) susu += n;
    if (k.dapat_kopi) kopi += n;
    if (k.dapat_mie)  mie  += n;
  });
  const hasKopi = list.some(k => k.dapat_kopi);
  const hasMie  = list.some(k => k.dapat_mie);
  return { susu, kopi, mie, list, hasKopi, hasMie };
}

// ---- Rekap rows grouped by Tiger / Yayasan ----
function buildRekapRows(list, hasKopi, hasMie) {
  const colCount = 4 + (hasKopi?1:0) + (hasMie?1:0);
  let html = '';
  ['Tiger','Yayasan'].forEach(tipe => {
    const grp = list.filter(k => k.tipe === tipe);
    if (!grp.length) return;
    let sub = { susu:0, kopi:0, mie:0 };
    let rowsHtml = '';
    grp.forEach(k => {
      const h = getHadir(k.id), n = h.filter(Boolean).length;
      if (k.dapat_susu) sub.susu += n;
      if (k.dapat_kopi) sub.kopi += n;
      if (k.dapat_mie)  sub.mie  += n;
      rowsHtml += `<tr>
        <td>${k.nama}</td>
        <td><span class="badge badge-${k.tipe.toLowerCase()}" style="font-size:10px">${k.tipe}</span></td>
        <td>${n} hari</td>
        <td>${k.dapat_susu ? n : '<span style="color:var(--text3);font-size:11px">-</span>'}</td>
        ${hasKopi ? `<td class="jatah-val">${k.dapat_kopi ? n : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
        ${hasMie  ? `<td class="jatah-val">${k.dapat_mie  ? n : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
      </tr>`;
    });
    html += `<tr style="background:var(--bg2)"><td colspan="${colCount}" style="padding:5px 8px;border-top:0.5px solid var(--border2)">
      <span class="badge badge-${tipe.toLowerCase()}" style="font-size:10px">${tipe}</span>
      <span style="color:var(--text3);font-size:10px;margin-left:4px">${grp.length} org</span>
    </td></tr>`;
    html += rowsHtml;
    html += `<tr style="background:var(--bg2)">
      <td colspan="3" style="padding:4px 8px;font-size:11px;font-weight:600;color:var(--text2)">Subtotal ${tipe}</td>
      <td style="text-align:center;font-weight:600">${sub.susu}</td>
      ${hasKopi ? `<td style="text-align:center;font-weight:600">${sub.kopi}</td>` : ''}
      ${hasMie  ? `<td style="text-align:center;font-weight:600">${sub.mie}</td>`  : ''}
    </tr>`;
  });
  return html;
}

// ============================================================
// SUPABASE DATA LAYER
// ============================================================
async function loadKaryawan() {
  const { data, error } = await sb.from('karyawan').select('*').order('nama');
  if (error) { console.error(error); return; }
  state.karyawan = data || [];
}

async function loadKehadiran() {
  // Load kehadiran for current week and 4 weeks back
  const pastDate = new Date(state.week + 'T00:00:00');
  pastDate.setDate(pastDate.getDate() - 28);
  const pastStr = pastDate.toISOString().split('T')[0];

  const { data, error } = await sb
    .from('kehadiran')
    .select('*')
    .gte('week_start', pastStr);
  if (error) { console.error(error); return; }

  state.kehadiran = {};
  (data || []).forEach(row => {
    if (!state.kehadiran[row.karyawan_id]) state.kehadiran[row.karyawan_id] = {};
    if (!state.kehadiran[row.karyawan_id][row.week_start]) {
      state.kehadiran[row.karyawan_id][row.week_start] = [false,false,false,false,false,false];
    }
    state.kehadiran[row.karyawan_id][row.week_start][row.hari] = row.hadir;
  });
}

async function loadMandors() {
  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .eq('role', 'mandor')
    .order('nama');
  if (error) { console.error(error); return; }
  state.mandors = data || [];
}

async function saveHadir(karId, hari, hadir) {
  const { error } = await sb.from('kehadiran').upsert({
    karyawan_id: karId,
    week_start: state.week,
    hari: hari,
    hadir: hadir,
    updated_by: state.user?.id || null,
    updated_at: new Date().toISOString()
  }, { onConflict: 'karyawan_id,week_start,hari' });
  if (error) console.error('saveHadir:', error);
}

async function addKaryawanDB(data) {
  const { error } = await sb.from('karyawan').insert({
    nama: data.nama, tipe: data.tipe,
    shift: parseInt(data.shift), lokasi: data.lokasi,
    dapat_susu: data.susu,
    dapat_kopi: data.kopi || false,
    dapat_mie:  data.mie  || false,
    created_by: state.user?.id || null
  });
  if (error) { showToast('Gagal menambah karyawan'); console.error(error); return false; }
  showToast('Karyawan berhasil ditambahkan');
  await loadKaryawan();
  return true;
}

async function deleteKaryawanDB(id) {
  const { error } = await sb.from('karyawan').delete().eq('id', id);
  if (error) { showToast('Gagal menghapus'); console.error(error); return; }
  showToast('Karyawan dihapus');
  await loadKaryawan();
  render();
}

// ============================================================
// AUTH
// ============================================================
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await afterLogin(session.user);
  } else {
    state.screen = 'home';
    // Load data for operator (anon) — parallel
    await Promise.all([loadKaryawan(), loadKehadiran()]);
    render();
  }
}

async function afterLogin(user) {
  state.user = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error || !profile) {
    showToast('Profil tidak ditemukan, hubungi superadmin');
    await sb.auth.signOut();
    state.screen = 'home'; render(); return;
  }
  state.profile = profile;
  state.role = profile.role;
  if (profile.role === 'mandor') {
    state.mandorWC = profile.workcenter;
    state.mandorShift = profile.shift;
    state.mandorNama = profile.nama;
    state.mandorTab = 'hadir';
  } else {
    state.adminTab = 'karyawan';
  }
  const tasks = [loadKaryawan(), loadKehadiran()];
  if (profile.role === 'superadmin') tasks.push(loadMandors());
  await Promise.all(tasks);
  state.screen = 'app';
  render();
}

async function doLoginMandor() {
  const username = document.getElementById('l-username').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!username || !pass) { setLoginErr('Username dan password wajib diisi'); return; }
  setLoginErr('');
  const loginBtn = document.getElementById('login-btn');
  loginBtn.textContent = 'Masuk...'; loginBtn.disabled = true;
  const email = toFakeEmail(username);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    setLoginErr('Username atau password salah');
    loginBtn.textContent = 'Masuk'; loginBtn.disabled = false;
    return;
  }
  await afterLogin(data.user);
}

async function doLoginSuper() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!email || !pass) { setLoginErr('Email dan password wajib diisi'); return; }
  setLoginErr('');
  const loginBtn = document.getElementById('login-btn');
  loginBtn.textContent = 'Masuk...'; loginBtn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    setLoginErr('Email atau password salah');
    loginBtn.textContent = 'Masuk'; loginBtn.disabled = false;
    return;
  }

async function doLogout() {
  state.screen = 'home'; state.role = null; state.user = null; state.profile = null;

  const el = document.getElementById('login-err');

}

function buildMandorHadir(wc, sh) {
  const list = groupKar(wc, sh);
  if (!list.length) return weekNavHTML() + `<div class="empty">Belum ada karyawan. Tambah dulu di tab Karyawan.</div>`;
  const hasKopi = list.some(k => k.dapat_kopi);
  const hasMie  = list.some(k => k.dapat_mie);
  const days = [0,1,2,3,4,5,6].map(i => addDays(state.week, i));
  const dayNames = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  const hdrs = dayNames.map((d,i) => `<th class="cb-cell">${d}<br><span style="font-size:10px;font-weight:400;color:var(--text3)">${fmt(days[i])}</span></th>`).join('');
  let html = weekNavHTML() + `<div class="table-wrap"><table><thead><tr>
    <th>Nama</th><th>Tipe</th><th>Susu</th>${hdrs}
    <th class="num-cell">Hadir</th>
    ${hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
    ${hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}
  </tr></thead><tbody>`;
  list.forEach(k => {
    const h = getHadir(k.id), tot = h.filter(Boolean).length;
    html += `<tr>
      <td>${k.nama}</td>
      <td><span class="badge badge-${k.tipe.toLowerCase()}" style="font-size:10px">${k.tipe}</span></td>
      <td>${k.dapat_susu ? '<span style="color:var(--success);font-size:11px">Ya</span>' : '<span style="color:var(--text3);font-size:11px">-</span>'}</td>
      ${h.map((v,di) => `<td class="cb-cell"><input type="checkbox" ${v?'checked':''} data-kid="${k.id}" data-day="${di}"></td>`).join('')}
      <td class="num-cell" id="tot-${k.id}">${tot}</td>
      ${hasKopi ? `<td class="jatah-val" id="kopi-${k.id}">${k.dapat_kopi ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
      ${hasMie  ? `<td class="jatah-val" id="mie-${k.id}">${k.dapat_mie   ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
    </tr>`;
  });
  html += `</tbody></table></div>
  <div class="help">Centang hari karyawan hadir. Jatah dihitung otomatis.</div>`;
  return html;
}

function buildMandorRekap(wc, sh) {
  const g = calcG(wc, sh);

  if (!g.list.length) return html + `<div class="empty">Belum ada karyawan</div>`;
  html += `<div class="table-wrap"><table><thead><tr>
    <th>Nama</th><th>Tipe</th><th>Hadir</th><th>Susu</th>
    ${g.hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
    ${g.hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}

  html += buildRekapRows(g.list, g.hasKopi, g.hasMie);
  html += `<tr class="subtotal"><td colspan="3">Total</td><td>${g.susu}</td>
    ${g.hasKopi ? `<td>${g.kopi}</td>` : ''}
    ${g.hasMie  ? `<td>${g.mie}</td>`  : ''}
    </tr></tbody></table></div>`;
  return html;
}

function buildMingguanAll() {
  const days = [0,1,2,3,4,5,6].map(i => addDays(state.week, i));
  const dayNames = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  const hdrs = dayNames.map((d,i) => `<th class="cb-cell">${d}<br><span style="font-size:10px;font-weight:400;color:var(--text3)">${fmt(days[i])}</span></th>`).join('');

  let html = weekNavHTML();
  ['Assembling','Injection'].forEach(wc => {
    html += `<div class="wc-block"><div class="wc-title"><span class="badge badge-${wcBadge(wc)}">${wc}</span><div class="divline"></div></div>`;
    [1,2,3].forEach(sh => {
      const list = groupKar(wc, sh);
      if (!list.length) return;
      const hasKopi = list.some(k => k.dapat_kopi);
      const hasMie  = list.some(k => k.dapat_mie);
      html += `<div class="sh-block"><div style="margin-bottom:6px"><span class="badge badge-s${sh}" style="font-size:10px">Shift ${sh}</span></div>
        <div class="table-wrap"><table><thead><tr>
          <th>Nama</th><th>Tipe</th><th>Susu</th>${hdrs}
          <th class="num-cell">Hadir</th>
          ${hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
          ${hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}
        </tr></thead><tbody>`;
      list.forEach(k => {
        const h = getHadir(k.id), tot = h.filter(Boolean).length;
        html += `<tr>
          <td>${k.nama}</td>
          <td><span class="badge badge-${k.tipe.toLowerCase()}" style="font-size:10px">${k.tipe}</span></td>
          <td>${k.dapat_susu ? '<span style="color:var(--success);font-size:11px">Ya</span>' : '<span style="color:var(--text3);font-size:11px">-</span>'}</td>
          ${h.map((v,di) => `<td class="cb-cell"><input type="checkbox" ${v?'checked':''} data-kid="${k.id}" data-day="${di}"></td>`).join('')}
          <td class="num-cell" id="tot-${k.id}">${tot}</td>
          ${hasKopi ? `<td class="jatah-val" id="kopi-${k.id}">${k.dapat_kopi ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
          ${hasMie  ? `<td class="jatah-val" id="mie-${k.id}">${k.dapat_mie  ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    });
    html += `</div>`;
  });
  return html;
}

function buildRekapAll() {
  let html = weekNavHTML() + `<div style="margin-bottom:1rem;display:flex;justify-content:flex-end"><button class="btn btn-sm btn-primary" onclick="downloadCSV()">↓ CSV</button></div>`;

    [1,2,3].forEach(sh => {

      html += `<div class="shift-card shift-card-${sh}">
        <div class="shift-card-head">
          <div class="shift-card-head-left">
            <span class="badge badge-s${sh}">Shift ${sh}</span>
            <span style="font-size:12px;color:var(--text2)">${g.list.length} karyawan</span>
          </div>
          <div class="shift-stats">

            ${g.hasKopi ? `<div class="sstat"><div class="sstat-val">${g.kopi}</div><div class="sstat-lbl">Kopi</div></div>` : ''}
            ${g.hasMie  ? `<div class="sstat"><div class="sstat-val">${g.mie}</div><div class="sstat-lbl">Mie</div></div>`  : ''}
          </div>
        </div>
        <div class="table-wrap"><table><thead><tr>

          ${g.hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
          ${g.hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}
        </tr></thead><tbody>`;

function attachEvents() {
  // Checkbox hadir
  document.querySelectorAll('input[data-kid]').forEach(cb => {
    cb.addEventListener('change', async function() {
      const kid = cb.dataset.kid, day = parseInt(cb.dataset.day);
      if (!state.kehadiran[kid]) state.kehadiran[kid] = {};
      if (!state.kehadiran[kid][state.week])
        state.kehadiran[kid][state.week] = [false,false,false,false,false,false];
      state.kehadiran[kid][state.week][day] = cb.checked;

      // Update totals inline
      const n = state.kehadiran[kid][state.week].filter(Boolean).length;
      const totEl  = document.getElementById('tot-'  + kid);
      const kopiEl = document.getElementById('kopi-' + kid);
      const mieEl  = document.getElementById('mie-'  + kid);
      const kar    = state.karyawan.find(k => k.id === kid);
      if (totEl)  totEl.textContent  = n;
      if (kopiEl) kopiEl.textContent = (kar && kar.dapat_kopi) ? n : '-';
      if (mieEl)  mieEl.textContent  = (kar && kar.dapat_mie)  ? n : '-';

      // Save to Supabase (non-blocking)
      await saveHadir(kid, day, cb.checked);
    });
  });

  // Enter key on login
  document.querySelectorAll('#l-username, #l-email, #l-pass').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('l-username')) doLoginMandor();
      else doLoginSuper();
    });
  });
}

async function buatAkunMandor() {
  const nama     = document.getElementById('m-nama').value.trim();
  const username = document.getElementById('m-username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
  const pass     = document.getElementById('m-pass').value;
  const wc       = document.getElementById('m-wc').value;
  const shift    = parseInt(document.getElementById('m-shift').value);
  const errEl    = document.getElementById('mandor-err');
  const btn      = document.getElementById('btn-buat-mandor');

  if (!nama || !username || !pass) { errEl.textContent = 'Nama, username, dan password wajib diisi'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password minimal 6 karakter'; return; }

  errEl.textContent = '';
  btn.textContent = 'Membuat...'; btn.disabled = true;

  // Konversi username ke fake email untuk Supabase Auth
  const fakeEmail = toFakeEmail(username);

  // Buat auth user via client terpisah dengan persistSession: false
  // agar session superadmin di localStorage tidak ketimpa
  const sbTemp = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: false, autoRefreshToken: false }
  });
  const { data: signUpData, error: signUpErr } = await sbTemp.auth.signUp({ email: fakeEmail, password: pass });
  if (signUpErr && !signUpErr.message.includes('already registered')) {
    errEl.textContent = 'Gagal buat akun: ' + signUpErr.message;
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  // Kalau signUp tidak beri session (email confirmation masih ON),
  // atau user sudah ada sebelumnya — coba signIn langsung
  let session = signUpData?.session;
  let uid = signUpData?.user?.id;
  if (!session) {
    const { data: siData, error: siErr } = await sbTemp.auth.signInWithPassword({ email: fakeEmail, password: pass });
    if (siErr || !siData.session) {
      errEl.textContent = 'Matikan "Confirm email" di Supabase: Authentication → Sign In / Providers → Email → toggle OFF "Confirm email"';
      btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
    }
    session = siData.session;
    uid = siData.user.id;
  }

  if (!uid) {
    errEl.textContent = 'User ID tidak ditemukan, coba lagi';
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  // Simpan profil mandor pakai sbTemp (login sebagai mandor itu sendiri)
  // sehingga RLS policy "user insert own profile" (auth.uid() = id) terpenuhi
  const { error: profErr } = await sbTemp.from('profiles').upsert({
    id: uid, nama, username, role: 'mandor', workcenter: wc, shift
  });
  if (profErr) {
    errEl.textContent = 'Akun dibuat tapi profil gagal: ' + profErr.message;
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  showToast(`Akun mandor "${nama}" (${username}) berhasil dibuat!`);
  state.mandorForm = { nama: '', username: '', password: '', workcenter: 'Assembling', shift: '1' };
  btn.textContent = '+ Buat Akun'; btn.disabled = false;
  await loadMandors();
  render();
}

async function deleteMandor(id) {
  if (!confirm('Hapus akun mandor ini?')) return;
  const { error } = await sb.from('profiles').delete().eq('id', id);
  if (error) { showToast('Gagal hapus: ' + error.message); return; }
  showToast('Akun mandor dihapus');
  await loadMandors();
  render();
}

function downloadCSV() {
  let list = [...state.karyawan];
  let filename = `rekap-jatah-${state.week}`;
  if (state.role === 'mandor') {
    list = list.filter(k => k.lokasi === state.mandorWC && k.shift === state.mandorShift);
    filename = `rekap-${state.mandorWC}-shift${state.mandorShift}-${state.week}`;
  }
  list.sort((a,b) => {
    if (a.lokasi !== b.lokasi) return a.lokasi.localeCompare(b.lokasi);
    if (a.shift  !== b.shift)  return a.shift - b.shift;
    if (a.tipe   !== b.tipe)   return a.tipe.localeCompare(b.tipe);
    return a.nama.localeCompare(b.nama);
  });
  const days = [0,1,2,3,4,5,6].map(i => addDays(state.week, i));
  const dayLabels = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map((d,i) => d + ' ' + fmt(days[i]));
  const headers = ['Nama','Tipe','Shift','Lokasi',...dayLabels,'Total Hadir','Jatah Susu','Jatah Kopi','Jatah Mie'];
  const rows = list.map(k => {
    const h = getHadir(k.id), n = h.filter(Boolean).length;
    return [
      k.nama, k.tipe, `Shift ${k.shift}`, k.lokasi,
      ...h.map(v => v ? '1' : '0'),
      n,
      k.dapat_susu ? n : 0,
      k.dapat_kopi ? n : 0,
      k.dapat_mie  ? n : 0,
    ];
  });
  const csv = '\uFEFF' + [headers, ...rows]
    .map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
    .join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSV berhasil didownload');
}

// ---- PWA INSTALL PROMPT ----
let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');
const installClose  = document.getElementById('install-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Tampilkan banner setelah 2 detik
  setTimeout(() => installBanner.classList.add('show'), 2000);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
  if (outcome === 'accepted') showToast('App berhasil diinstall!');
});

installClose.addEventListener('click', () => {
  installBanner.classList.remove('show');
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
  showToast('App berhasil diinstall!');
});
