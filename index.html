<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jatah Karyawan - PT. Tigermandiri Pratama</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0f2f5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jatah Karyawan">
  <link rel="apple-touch-icon" href="logo.jpg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LIGHT THEME — CLEAN FORMAL ──────────────────────────── */
    :root {
      --bg:        #f0f2f5;
      --bg2:       #ffffff;
      --bg3:       #f4f6f9;
      --bg4:       #e8ebf0;
      --text:      #1a2030;
      --text2:     #4a5568;
      --text3:     #94a3b8;
      --border:    rgba(0,0,0,0.07);
      --border2:   rgba(0,0,0,0.11);
      --info-bg:   rgba(59,130,246,0.08);
      --info:      #2563eb;
      --info2:     #1d4ed8;
      --success:   #16a34a;
      --danger:    #dc2626;
      --amber:     #d97706;
      --purple:    #7c3aed;
      --radius:    9px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow:    0 4px 16px rgba(0,0,0,.10);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.14);
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(99,102,241,0.03) 0%, transparent 50%);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      min-height: 100vh;
    }

    #app { max-width: 980px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* ── LOADING ─────────────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
    .spinner { width: 34px; height: 34px; border: 2.5px solid var(--border2); border-top-color: var(--info); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOPBAR ──────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border2);
      flex-wrap: wrap;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; margin-right: auto; }
    .topbar-brand-icon {
      width: 30px; height: 30px; background: var(--info2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; box-shadow: 0 2px 8px rgba(59,130,230,.35);
    }
    .topbar-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .topbar-meta { display: flex; gap: 6px; align-items: center; margin-right: 4px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      padding: 0 14px; height: 34px; border-radius: var(--radius);
      border: 1px solid var(--border2); background: var(--bg3);
      cursor: pointer; font-size: 13px; color: var(--text2);
      white-space: nowrap; font-weight: 500;
      font-family: inherit;
      transition: all .13s;
    }
    .btn:hover { background: var(--bg4); color: var(--text); border-color: rgba(255,255,255,.16); }
    .btn.active {
      background: var(--info2); color: #fff; border-color: transparent;
      font-weight: 600; box-shadow: 0 0 0 3px rgba(59,130,230,.22), 0 2px 8px rgba(59,130,230,.3);
    }
    .btn.active:hover { opacity: .92; }
    .btn-sm { height: 29px; font-size: 12px; padding: 0 11px; }
    .btn-primary { color: var(--info); border-color: rgba(82,154,255,.35); background: var(--info-bg); }
    .btn-primary:hover { background: rgba(82,154,255,.18); color: var(--info); border-color: var(--info2); }
    .btn-danger { color: var(--danger); border-color: rgba(240,106,101,.3); font-size: 11px; height: 27px; padding: 0 10px; background: rgba(240,106,101,.06); }
    .btn-danger:hover { background: rgba(240,106,101,.14); border-color: var(--danger); }
    .btn-block {
      width: 100%; height: 46px; font-size: 13px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: #fff; background: var(--info2);
      border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit;
      transition: all .15s;
      box-shadow: 0 4px 14px rgba(59,130,230,.35);
    }
    .btn-block:hover { background: var(--info); box-shadow: 0 6px 20px rgba(82,154,255,.4); transform: translateY(-1px); }
    .btn-block:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(59,130,230,.3); }

    /* ── HOME ────────────────────────────────────────────────── */
    .home-outer {
      min-height: 100vh; display: flex; align-items: stretch;
      margin: -1.5rem -1rem; overflow: hidden; position: relative;
    }

    /* Background decorative elements */
    .home-outer::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 50%, rgba(59,130,230,.13) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 85% 20%, rgba(124,58,237,.08) 0%, transparent 50%),
        radial-gradient(ellipse 30% 40% at 80% 80%, rgba(59,130,230,.06) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Left panel — branding */
    .home-left {
      display: none; flex-direction: column; justify-content: center;
      padding: 3rem 3.5rem; width: 42%; flex-shrink: 0;
      border-right: 1px solid var(--border2); position: relative;
      background: linear-gradient(160deg, rgba(29,78,216,.05) 0%, rgba(124,58,237,.03) 100%);
    }
    @media (min-width: 768px) { .home-left { display: flex; } }

    .home-left-logo {
      display: flex; align-items: center; gap: 14px; margin-bottom: 3.5rem;
    }
    .home-left-logo-img {
      width: 52px; height: 52px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(59,130,230,.3), 0 0 0 1px rgba(82,154,255,.2);
    }
    .home-left-logo-img img { width: 100%; height: 100%; object-fit: cover; }
    .home-left-logo-text { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: .01em; }
    .home-left-logo-text span { display: block; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-top: 2px; }

    .home-left-headline {
      font-size: 34px; font-weight: 700; color: var(--text);
      line-height: 1.2; letter-spacing: -.04em; margin-bottom: 1rem;
    }
    .home-left-headline em {
      font-style: normal;
      background: linear-gradient(135deg, var(--info) 0%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-left-sub {
      font-size: 13px; color: var(--text2); line-height: 1.7; max-width: 280px;
      margin-bottom: 2.5rem;
    }

    /* Stats row di kiri */
    .home-stats { display: flex; gap: 1.5rem; }
    .home-stat { }
    .home-stat-val { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'IBM Plex Mono', monospace; letter-spacing: -.03em; line-height: 1; }
    .home-stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; margin-top: 4px; }
    .home-stat-div { width: 1px; background: var(--border2); align-self: stretch; }

    /* Decorative corner grid */
    .home-left-deco {
      position: absolute; bottom: 2rem; right: 2rem; opacity: .07;
      width: 120px; height: 120px;
      background-image: radial-gradient(circle, var(--info) 1.5px, transparent 1.5px);
      background-size: 16px 16px;
    }

    /* Right panel — access */
    .home-right {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 2rem 1.5rem; position: relative;
    }
    .home-right-inner { width: 100%; max-width: 380px; }

    /* Mobile header (hidden on desktop) */
    .home-mobile-header {
      text-align: center; margin-bottom: 2.5rem;
    }
    @media (min-width: 768px) { .home-mobile-header { display: none; } }
    .home-mobile-logo {
      width: 64px; height: 64px; border-radius: 18px; overflow: hidden;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 28px rgba(59,130,230,.35), 0 0 0 1px rgba(82,154,255,.2);
    }
    .home-mobile-logo img { width: 100%; height: 100%; object-fit: cover; }
    .home-mobile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.03em; }
    .home-mobile-sub { font-size: 11px; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-top: 4px; font-weight: 600; }

    /* Access section label */
    .home-access-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 10px;
    }
    .home-access-label::before, .home-access-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border2);
    }

    /* Access cards — stacked, full width */
    .access-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: all .18s;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 10px;
      position: relative; overflow: hidden;
    }
    .access-card::after {
      content: '›';
      position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%);
      font-size: 20px; color: var(--text3);
      transition: all .18s;
    }
    .access-card:hover {
      border-color: var(--info2);
      background: var(--bg3);
      box-shadow: var(--shadow), 0 0 0 1px rgba(82,154,255,.15);
      transform: translateX(3px);
    }
    .access-card:hover::after { right: 1rem; color: var(--info); }
    .access-card-icon {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .access-card-icon-operator { background: rgba(82,154,255,.12); border: 1px solid rgba(82,154,255,.2); }
    .access-card-icon-mandor   { background: rgba(67,201,122,.12); border: 1px solid rgba(67,201,122,.2); }
    .access-card-body { flex: 1; }
    .access-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .access-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; padding-right: 1.5rem; }
    .access-card-badge {
      font-size: 9px; font-weight: 700; color: var(--text3);
      letter-spacing: .08em; text-transform: uppercase;
      background: var(--bg4); border: 1px solid var(--border2);
      padding: 2px 7px; border-radius: 100px; margin-left: 6px;
      vertical-align: middle;
    }

    /* Divider */
    .home-or {
      display: flex; align-items: center; gap: 10px;
      font-size: 10px; color: var(--text3); font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      margin: 4px 0 10px;
    }
    .home-or::before, .home-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Superadmin link */
    .home-sa {
      text-align: center; margin-top: 1.25rem;
    }
    .home-sa button {
      background: none; border: 1px solid var(--border2);
      border-radius: var(--radius); height: 32px; padding: 0 16px;
      font-size: 11px; color: var(--text3); cursor: pointer;
      transition: all .15s; letter-spacing: .04em;
      font-family: inherit; font-weight: 600;
    }
    .home-sa button:hover { color: var(--text2); background: var(--bg3); border-color: rgba(255,255,255,.15); }

    /* Week info pill */
    .home-week-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 100px; padding: 5px 12px;
      font-size: 11px; color: var(--text2); font-weight: 500;
      margin-bottom: 2rem;
    }
    .home-week-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }

    /* ── LOGIN ───────────────────────────────────────────────── */
    .login-outer {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; margin: -1.5rem -1rem;
    }
    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 390px;
      box-shadow: var(--shadow-lg);
    }
    .login-icon {
      width: 68px; height: 68px; background: var(--info2);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 1.5rem;
      box-shadow: 0 8px 28px rgba(59,130,230,.38);
    }
    .login-card h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; letter-spacing: -.03em; color: var(--text); }
    .login-card .sub { font-size: 11px; color: var(--text3); margin-bottom: 2rem; text-align: center; letter-spacing: .07em; text-transform: uppercase; font-weight: 600; }
    .login-divider { height: 1px; background: var(--border2); margin-bottom: 2rem; }
    .back-link { margin-top: 1.25rem; text-align: center; }
    .back-link button { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; transition: color .15s; font-family: inherit; }
    .back-link button:hover { color: var(--text2); }
    .err-msg { font-size: 12px; color: var(--danger); margin: 8px 0; min-height: 18px; text-align: center; font-weight: 500; }

    /* ── FORMS ───────────────────────────────────────────────── */
    .field { margin-bottom: 1.1rem; }
    .field label {
      font-size: 10px; color: var(--text2); display: block;
      margin-bottom: 7px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
    }
    .field input[type=text],
    .field input[type=email],
    .field input[type=password],
    .field select {
      width: 100%; font-size: 14px; padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text);
      height: 44px;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .field input::placeholder { color: var(--text3); }
    .field input:focus, .field select:focus {
      outline: none; border-color: var(--info);
      box-shadow: 0 0 0 3px rgba(82,154,255,.15);
      background: var(--bg4);
    }
    .field select option { background: var(--bg3); }
    .inline-form { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .inline-form .field { margin-bottom: 0; }
    .inline-form .field input[type=text], .inline-form .field select { height: 36px; font-size: 13px; padding: 6px 10px; }
    .check-row { display: flex; align-items: center; gap: 9px; height: 34px; }
    .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--info); cursor: pointer; }
    .check-row label { font-size: 13px; color: var(--text); cursor: pointer; font-weight: 500; text-transform: none; letter-spacing: 0; }

    /* ── WEEK NAV ────────────────────────────────────────────── */
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .week-nav span.lbl { font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
    .week-nav span.range { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

    /* ── TABLES ──────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      font-weight: 700; font-size: 10px; color: var(--text3);
      text-align: left; padding: 10px 12px;
      border-bottom: 1px solid var(--border2);
      white-space: nowrap; text-transform: uppercase;
      letter-spacing: .08em; background: var(--bg3);
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover > td { background: rgba(255,255,255,.03); transition: background .08s; }
    .subtotal td { font-weight: 700; background: var(--bg4); font-size: 12px; }
    .subtotal:hover > td { background: var(--bg4) !important; }
    .cb-cell { text-align: center; }
    .cb-cell input { width: 17px; height: 17px; cursor: pointer; accent-color: var(--info); }
    .num-cell { text-align: center; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .jatah-head { background: var(--info-bg); color: var(--info); text-align: center; font-size: 11px; font-weight: 700; }
    .jatah-val { text-align: center; font-weight: 700; color: var(--info); font-family: 'IBM Plex Mono', monospace; }

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 100px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    }
    .badge-tiger   { background: rgba(37,99,235,.10); color: #1d4ed8; border: 1px solid rgba(37,99,235,.2); }
    .badge-yayasan { background: rgba(22,163,74,.10); color: #15803d; border: 1px solid rgba(22,163,74,.2); }
    /* Shift badges — solid pill, tiap shift warna beda dan jelas */
    .badge-s1 { background: #1d4ed8; color: #fff; border: none; box-shadow: 0 2px 6px rgba(29,78,216,.3); padding: 3px 11px; font-size: 11px; }
    .badge-s2 { background: #7c3aed; color: #fff; border: none; box-shadow: 0 2px 6px rgba(124,58,237,.3); padding: 3px 11px; font-size: 11px; }
    .badge-s3 { background: #d97706; color: #fff; border: none; box-shadow: 0 2px 6px rgba(217,119,6,.3);  padding: 3px 11px; font-size: 11px; }
    /* Workcenter badges */
    .badge-asm { background: rgba(22,163,74,.12); color: #15803d; border: 1.5px solid rgba(22,163,74,.25); font-size: 11px; padding: 3px 11px; }
    .badge-inj { background: rgba(220,38,38,.10); color: #b91c1c; border: 1.5px solid rgba(220,38,38,.22); font-size: 11px; padding: 3px 11px; }

    /* ── METRIC CARDS ────────────────────────────────────────── */
    .metric-grid { display: grid; gap: 12px; margin-bottom: 2rem; }
    .mc {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 1.3rem 1.5rem;
      border-top: 2px solid var(--info2);
      box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .mc::before {
      content: ''; position: absolute; top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle at top right, rgba(82,154,255,.08), transparent 70%);
      pointer-events: none;
    }
    .mc-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 10px; font-weight: 700; }
    .mc-val { font-size: 48px; font-weight: 700; color: var(--info); line-height: 1; letter-spacing: -.04em; font-family: 'IBM Plex Mono', monospace; }
    .mc-sub { font-size: 11px; color: var(--text3); margin-top: 8px; }

    /* ── FILTER BAR ──────────────────────────────────────────── */
    .rekap-filter {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .rekap-filter-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .09em; white-space: nowrap;
    }
    .filter-chip {
      height: 30px; padding: 0 13px; border-radius: 100px;
      border: 1px solid var(--border2); background: var(--bg3);
      color: var(--text2); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .13s; font-family: inherit;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: rgba(255,255,255,.18); color: var(--text); background: var(--bg4); }
    .filter-chip.active { background: var(--info2); color: #fff; border-color: transparent; box-shadow: 0 2px 8px rgba(59,130,230,.35); }
    .filter-chip.active-asm { background: rgba(22,163,74,.12); color: #15803d; border-color: rgba(22,163,74,.3); }
    .filter-chip.active-inj { background: rgba(220,38,38,.10); color: #b91c1c; border-color: rgba(220,38,38,.25); }
    .filter-chip.active-s1  { background: var(--info2); color: #fff; border-color: transparent; }
    .filter-chip.active-s2  { background: #7c3aed; color: #fff; border-color: transparent; }
    .filter-chip.active-s3  { background: #d97706; color: #fff; border-color: transparent; }
    .filter-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }
    /* Topbar rekap */
    .rekap-topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 1rem 1.25rem;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);

<script>
// ============================================================
// CONFIG — Ganti dengan credentials Supabase project kamu
// ============================================================
const SUPABASE_URL  = 'https://yhyiljuplidjpzhapotk.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeWlsanVwbGlkanB6aGFwb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkwNDAsImV4cCI6MjA5MDY3NTA0MH0.Y8viOJo3K_ptcPQ5el0HtK_JrptRTKymUaNqxOqzrS8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let state = {
  screen: 'loading',  // loading | home | loginMandor | loginSuper | app
  role: null,         // null | operator | mandor | superadmin
  user: null,
  profile: null,
  // mandor scope (from profile)
  mandorWC: '',
  mandorShift: 0,
  mandorNama: '',
  // tabs
  mandorTab: 'hadir',
  adminTab: 'karyawan',
  // data cache
  karyawan: [],
  kehadiran: {},   // { karyawan_id: { week_start: [bool x6] } }
  mandors: [],     // for superadmin user management
  // week
  week: getMonday(new Date()),
  // form
  form: { nama: '', tipe: 'Tiger', shift: '1', lokasi: 'Assembling', susu: true, kopi: false, mie: false },
  mandorForm: { nama: '', username: '', password: '', workcenter: 'Assembling', shift: '1' },
  loginForm: { email: '', password: '', err: '' },
  editingKaryawanId: null,  // id karyawan yg sedang di-edit nama
  rekapFilter: { wc: 'all', shift: 'all' },  // filter rekap operator
  searchHadir: '',  // search nama di input hadir
};

// ============================================================
// HELPERS
// ============================================================
function fmtDate(d) {
  // Format local date as YYYY-MM-DD (bukan UTC, hindari timezone shift)
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function getMonday(d) {
  const day = d.getDay(), diff = day === 0 ? -6 : 1 - day;
  const m = new Date(d); m.setDate(d.getDate() + diff);
  return fmtDate(m);
}

function addDays(wk, n) {
  const d = new Date(wk + 'T00:00:00'); d.setDate(d.getDate() + n); return d;
}

function fmt(d) { return d.getDate() + '/' + (d.getMonth() + 1); }

function fmtLong(d) {
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });
}

function wcBadge(wc) { return wc === 'Assembling' ? 'asm' : 'inj'; }

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function getHadir(karId) {
  return state.kehadiran[karId]?.[state.week] || [false,false,false,false,false,false,false];
}

function groupKar(lokasi, shift) {
  return state.karyawan.filter(k => k.lokasi === lokasi && k.shift === shift);
}

function calcG(lokasi, shift) {
  const list = groupKar(lokasi, shift);
  let susu = 0, kopi = 0, mie = 0;
  list.forEach(k => {
    const h = getHadir(k.id), n = h.filter(Boolean).length;
    if (k.dapat_susu) susu += n;
    if (k.dapat_kopi) kopi += n;
    if (k.dapat_mie)  mie  += n;
  });
  const hasKopi = list.some(k => k.dapat_kopi);
  const hasMie  = list.some(k => k.dapat_mie);
  return { susu, kopi, mie, list, hasKopi, hasMie };
}

// ---- Rekap rows grouped by Tiger / Yayasan ----
function buildRekapRows(list, hasKopi, hasMie) {
  const colCount = 4 + (hasKopi?1:0) + (hasMie?1:0);
  let html = '';
  ['Tiger','Yayasan'].forEach(tipe => {
    const grp = list.filter(k => k.tipe === tipe);
    if (!grp.length) return;
    let sub = { susu:0, kopi:0, mie:0 };
    let rowsHtml = '';
    grp.forEach(k => {
      const h = getHadir(k.id), n = h.filter(Boolean).length;
      if (k.dapat_susu) sub.susu += n;
      if (k.dapat_kopi) sub.kopi += n;
      if (k.dapat_mie)  sub.mie  += n;
      rowsHtml += `<tr>
        <td>${k.nama}</td>
        <td><span class="badge badge-${k.tipe.toLowerCase()}" style="font-size:10px">${k.tipe}</span></td>
        <td>${n} hari</td>
        <td>${k.dapat_susu ? n : '<span style="color:var(--text3);font-size:11px">-</span>'}</td>
        ${hasKopi ? `<td class="jatah-val">${k.dapat_kopi ? n : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
        ${hasMie  ? `<td class="jatah-val">${k.dapat_mie  ? n : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
      </tr>`;
    });
    html += `<tr style="background:var(--bg2)"><td colspan="${colCount}" style="padding:5px 8px;border-top:0.5px solid var(--border2)">
      <span class="badge badge-${tipe.toLowerCase()}" style="font-size:10px">${tipe}</span>
      <span style="color:var(--text3);font-size:10px;margin-left:4px">${grp.length} org</span>
    </td></tr>`;
    html += rowsHtml;
    html += `<tr style="background:var(--bg2)">
      <td colspan="3" style="padding:4px 8px;font-size:11px;font-weight:600;color:var(--text2)">Subtotal ${tipe}</td>
      <td style="text-align:center;font-weight:600">${sub.susu}</td>
      ${hasKopi ? `<td style="text-align:center;font-weight:600">${sub.kopi}</td>` : ''}
      ${hasMie  ? `<td style="text-align:center;font-weight:600">${sub.mie}</td>`  : ''}
    </tr>`;
  });
  return html;
}

// ============================================================
// SUPABASE DATA LAYER
// ============================================================
async function loadKaryawan() {
  const { data, error } = await sb.from('karyawan').select('*').order('nama');
  if (error) { console.error(error); return; }
  state.karyawan = data || [];
}

async function loadKehadiran() {
  // Load kehadiran for current week and 4 weeks back
  const pastDate = new Date(state.week + 'T00:00:00');
  pastDate.setDate(pastDate.getDate() - 28);
  const pastStr = pastDate.toISOString().split('T')[0];

  const { data, error } = await sb
    .from('kehadiran')
    .select('*')
    .gte('week_start', pastStr);
  if (error) { console.error(error); return; }

  state.kehadiran = {};
  (data || []).forEach(row => {
    if (!state.kehadiran[row.karyawan_id]) state.kehadiran[row.karyawan_id] = {};
    if (!state.kehadiran[row.karyawan_id][row.week_start]) {
      state.kehadiran[row.karyawan_id][row.week_start] = [false,false,false,false,false,false,false];
    }
    state.kehadiran[row.karyawan_id][row.week_start][row.hari] = row.hadir;
  });
}

async function loadMandors() {
  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .eq('role', 'mandor')
    .order('nama');
  if (error) { console.error(error); return; }
  state.mandors = data || [];
}

async function saveHadir(karId, hari, hadir) {
  const { error } = await sb.from('kehadiran').upsert({
    karyawan_id: karId,
    week_start: state.week,
    hari: hari,
    hadir: hadir,
    updated_by: state.user?.id || null,
    updated_at: new Date().toISOString()
  }, { onConflict: 'karyawan_id,week_start,hari' });
  if (error) console.error('saveHadir:', error);
}

async function addKaryawanDB(data) {
  const { error } = await sb.from('karyawan').insert({
    nama: data.nama, tipe: data.tipe,
    shift: parseInt(data.shift), lokasi: data.lokasi,
    dapat_susu: data.susu,
    dapat_kopi: data.kopi || false,
    dapat_mie:  data.mie  || false,
    created_by: state.user?.id || null
  });
  if (error) { showToast('Gagal menambah karyawan'); console.error(error); return false; }
  showToast('Karyawan berhasil ditambahkan');
  await loadKaryawan();
  return true;
}

async function deleteKaryawanDB(id) {
  const { error } = await sb.from('karyawan').delete().eq('id', id);
  if (error) { showToast('Gagal menghapus'); console.error(error); return; }
  showToast('Karyawan dihapus');
  await loadKaryawan();
  render();
}

function editNama(id) {
  state.editingKaryawanId = id;
  render();
  setTimeout(() => {
    const el = document.getElementById('edit-nama-' + id);
    if (el) { el.focus(); el.select(); }
  }, 50);
}

function cancelEditNama() {
  state.editingKaryawanId = null;
  render();
}

async function saveNama(id) {
  const input = document.getElementById('edit-nama-' + id);
  if (!input) return;
  const namaBaru = input.value.trim();
  if (!namaBaru) { showToast('Nama tidak boleh kosong'); return; }

  // Coba update + select balik untuk verifikasi
  const { data, error } = await sb
    .from('karyawan')
    .update({ nama: namaBaru })
    .eq('id', id)
    .select('nama')
    .single();

  if (error) { showToast('Gagal menyimpan: ' + error.message); return; }

  // Verifikasi nama benar-benar tersimpan
  if (!data || data.nama !== namaBaru) {
    showToast('Gagal: perubahan tidak tersimpan (cek RLS policy Supabase)');
    state.editingKaryawanId = null;
    await loadKaryawan();
    render();
    return;
  }

  // Reload dari DB biar sinkron
  await loadKaryawan();
  state.editingKaryawanId = null;
  showToast('Nama berhasil diperbarui ke: ' + namaBaru);
  render();
}

// ============================================================
// AUTH
// ============================================================
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await afterLogin(session.user);
  } else {
    state.screen = 'home';
    // Load data for operator (anon) — parallel
    await Promise.all([loadKaryawan(), loadKehadiran()]);
    render();
  }
}

async function afterLogin(user) {
  state.user = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error || !profile) {
    showToast('Profil tidak ditemukan, hubungi superadmin');
    await sb.auth.signOut();
    state.screen = 'home'; render(); return;
  }
  state.profile = profile;
  state.role = profile.role;
  if (profile.role === 'mandor') {
    state.mandorWC = profile.workcenter;
    state.mandorShift = profile.shift;
    state.mandorNama = profile.nama;
    state.mandorTab = 'hadir';
  } else {
    state.adminTab = 'karyawan';
  }
  const tasks = [loadKaryawan(), loadKehadiran()];
  if (profile.role === 'superadmin') tasks.push(loadMandors());
  await Promise.all(tasks);
  state.screen = 'app';
  render();
}

async function doLoginMandor() {
  const username = document.getElementById('l-username').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!username || !pass) { setLoginErr('Username dan password wajib diisi'); return; }
  setLoginErr('');
  const loginBtn = document.getElementById('login-btn');
  loginBtn.textContent = 'Masuk...'; loginBtn.disabled = true;
  const email = toFakeEmail(username);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    setLoginErr('Username atau password salah');
    loginBtn.textContent = 'Masuk'; loginBtn.disabled = false;
    return;
  }
  await afterLogin(data.user);
}

async function doLoginSuper() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!email || !pass) { setLoginErr('Email dan password wajib diisi'); return; }
  setLoginErr('');
  const loginBtn = document.getElementById('login-btn');
  loginBtn.textContent = 'Masuk...'; loginBtn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    setLoginErr('Email atau password salah');
    loginBtn.textContent = 'Masuk'; loginBtn.disabled = false;
    return;
  }
  await afterLogin(data.user);
}

async function doLogout() {
  state.screen = 'home'; state.role = null; state.user = null; state.profile = null;
  render();
  await sb.auth.signOut();
}

function setLoginErr(msg) {
  const el = document.getElementById('login-err');
  if (el) el.textContent = msg;
}

        <div class="rekap-topbar-logo"><img src="logo.jpg" alt="logo"></div>

      <button class="filter-chip ${aSh('2')}" onclick="setRekapFilter('shift','2')">Shift 2</button>

    <!-- SUMMARY CARDS -->
    <div class="rekap-summary">
      <div class="rekap-sum-card">
        <div class="rekap-sum-icon rekap-sum-icon-kar">👥</div>
        <div class="rekap-sum-body">
          <div class="rekap-sum-val rekap-sum-val-blue">${grandKar}</div>
          <div class="rekap-sum-lbl">Karyawan</div>

      <div class="rekap-sum-card">

function setRekapFilter(type, val) {
  state.rekapFilter[type] = val;
  render();
}

function buildRekapRowsPremium(list, hasKopi, hasMie) {
  let html = '';
  ['Tiger','Yayasan'].forEach(tipe => {
    const grp = list.filter(k => k.tipe === tipe);
    if (!grp.length) return;
    let sub = { susu:0, kopi:0, mie:0 };

    const grpHadir = grp.filter(k => getHadir(k.id).filter(Boolean).length > 0);
    if (!grpHadir.length) { grp.forEach(k => { /* hitung subtotal tetap */ const h=getHadir(k.id),n=h.filter(Boolean).length; if(k.dapat_susu)sub.susu+=n;if(k.dapat_kopi)sub.kopi+=n;if(k.dapat_mie)sub.mie+=n; }); return; }

    // Group header row
    html += `<tr class="rekap-grp-row"><td colspan="${4 + (hasKopi?1:0) + (hasMie?1:0)}" style="padding:5px 14px">
      <span class="badge badge-${tipe.toLowerCase()}" style="font-size:10px">${tipe}</span>
      <span style="color:var(--text3);font-size:10px;margin-left:6px">${grp.length} org</span>
    </td></tr>`;

    grp.forEach(k => {
      const h = getHadir(k.id), n = h.filter(Boolean).length;
      if (k.dapat_susu) sub.susu += n;
      if (k.dapat_kopi) sub.kopi += n;
      if (k.dapat_mie)  sub.mie  += n;
      if (n === 0) return; // skip yang belum hadir sama sekali
      html += `<tr>
        <td>${k.nama}</td>
        <td><span class="badge badge-${tipe.toLowerCase()}" style="font-size:9px">${tipe}</span></td>
        <td class="rekap-hadir"><strong>${n}</strong> <span>hari</span></td>
        <td class="rekap-num rekap-num-susu">${k.dapat_susu ? n : '<span style="color:var(--text3)">—</span>'}</td>
        ${hasKopi ? `<td class="rekap-num rekap-num-kopi">${k.dapat_kopi ? n : '<span style="color:var(--text3)">—</span>'}</td>` : ''}
        ${hasMie  ? `<td class="rekap-num rekap-num-mie">${k.dapat_mie   ? n : '<span style="color:var(--text3)">—</span>'}</td>` : ''}
      </tr>`;
    });

    // Subtotal
    html += `<tr class="rekap-sub-row">
      <td colspan="3" style="padding-left:14px">Subtotal ${tipe}</td>
      <td class="rekap-num rekap-num-susu">${sub.susu}</td>
      ${hasKopi ? `<td class="rekap-num rekap-num-kopi">${sub.kopi}</td>` : ''}
      ${hasMie  ? `<td class="rekap-num rekap-num-mie">${sub.mie}</td>`   : ''}
    </tr>`;
  });
  return html;
}

function buildMandorHadir(wc, sh) {
  const listAll = groupKar(wc, sh);
  if (!listAll.length) return weekNavHTML() + `<div class="empty">Belum ada karyawan. Tambah dulu di tab Karyawan.</div>`;

  const q = (state.searchHadir || '').toLowerCase().trim();
  const list = q ? listAll.filter(k => k.nama.toLowerCase().includes(q)) : listAll;

  const hasKopi = listAll.some(k => k.dapat_kopi);
  const hasMie  = listAll.some(k => k.dapat_mie);
  const days    = [0,1,2,3,4,5,6].map(i => addDays(state.week, i));
  const dayNames = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  const hdrs = dayNames.map((d,i) => `<th class="cb-cell">${d}<br><span style="font-size:10px;font-weight:400;color:var(--text3)">${fmt(days[i])}</span></th>`).join('');

  let html = weekNavHTML();

  // Search bar
  html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;">
    <div style="position:relative;flex:1;min-width:200px;max-width:320px;">
      <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;">🔍</span>
      <input type="text" id="search-hadir-input"
        value="${(state.searchHadir||'').replace(/"/g,'&quot;')}"
        placeholder="Cari nama karyawan..."
        oninput="state.searchHadir=this.value;render()"
        style="width:100%;height:36px;padding:0 12px 0 34px;border-radius:var(--radius);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s,box-shadow .15s;"
        onfocus="this.style.borderColor='var(--info)';this.style.boxShadow='0 0 0 3px rgba(37,99,235,.12)'"
        onblur="this.style.borderColor='';this.style.boxShadow=''">
    </div>
    <span style="font-size:12px;color:var(--text3);font-weight:500;">
      ${q ? `${list.length} dari ${listAll.length} karyawan` : `${listAll.length} karyawan`}
    </span>
    ${q ? `<button onclick="state.searchHadir='';render()" style="background:none;border:1px solid var(--border2);border-radius:var(--radius);height:30px;padding:0 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;">✕ Reset</button>` : ''}
  </div>`;

  if (!list.length) {
    html += `<div class="empty">Tidak ada karyawan dengan nama "<strong>${state.searchHadir}</strong>"</div>`;
    return html;
  }

  html += `<div class="table-wrap"><table><thead><tr>
    <th>Nama</th><th>Tipe</th><th>Susu</th>${hdrs}
    <th class="num-cell">Hadir</th>
    ${hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
    ${hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}
  </tr></thead><tbody>`;

  list.forEach(k => {
    const h = getHadir(k.id), tot = h.filter(Boolean).length;
    // Highlight nama kalau ada query
    const namaDisplay = q
      ? k.nama.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
          '<mark style="background:rgba(37,99,235,.15);color:var(--info);border-radius:3px;padding:0 2px">$1</mark>')
      : k.nama;
    html += `<tr>
      <td>${namaDisplay}</td>
      <td><span class="badge badge-${k.tipe.toLowerCase()}" style="font-size:10px">${k.tipe}</span></td>
      <td>${k.dapat_susu ? '<span style="color:var(--success);font-size:11px">Ya</span>' : '<span style="color:var(--text3);font-size:11px">-</span>'}</td>
      ${h.map((v,di) => `<td class="cb-cell"><input type="checkbox" ${v?'checked':''} data-kid="${k.id}" data-day="${di}"></td>`).join('')}
      <td class="num-cell" id="tot-${k.id}">${tot}</td>
      ${hasKopi ? `<td class="jatah-val" id="kopi-${k.id}">${k.dapat_kopi ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
      ${hasMie  ? `<td class="jatah-val" id="mie-${k.id}">${k.dapat_mie   ? tot : '<span style="color:var(--text3)">-</span>'}</td>` : ''}
    </tr>`;
  });
  html += `</tbody></table></div>
  <div class="help">Centang hari karyawan hadir. Jatah dihitung otomatis.</div>`;
  return html;
}

      <div class="field"><label>Kopi</label>

      </div>
      <div class="field"><label>Mie</label>

    <tbody>${rows}</tbody></table></div>

function buildMandorRekap(wc, sh) {
  const g = calcG(wc, sh);
  const colCount = 1 + (g.hasKopi?1:0) + (g.hasMie?1:0);
  const cols = colCount === 3 ? 'repeat(3,minmax(0,1fr))' : colCount === 2 ? 'repeat(2,minmax(0,1fr))' : 'minmax(0,1fr)';
  let html = weekNavHTML()
    + `<div style="margin-bottom:1rem;display:flex;justify-content:flex-end"><button class="btn btn-sm btn-primary" onclick="downloadCSV()">↓ CSV</button></div>`
    + `<div class="metric-grid" style="grid-template-columns:${cols}">
    <div class="mc"><div class="mc-lbl">Susu</div><div class="mc-val">${g.susu}</div>
      <div class="mc-sub">${g.list.filter(k=>k.dapat_susu).length} eligible</div></div>
    ${g.hasKopi ? `<div class="mc"><div class="mc-lbl">Kopi</div><div class="mc-val">${g.kopi}</div><div class="mc-sub">${g.list.filter(k=>k.dapat_kopi).length} eligible</div></div>` : ''}
    ${g.hasMie  ? `<div class="mc"><div class="mc-lbl">Mie</div><div class="mc-val">${g.mie}</div><div class="mc-sub">${g.list.filter(k=>k.dapat_mie).length} eligible</div></div>`   : ''}
  </div><div class="slbl">Detail karyawan</div>`;
  if (!g.list.length) return html + `<div class="empty">Belum ada karyawan</div>`;
  html += `<div class="table-wrap"><table><thead><tr>
    <th>Nama</th><th>Tipe</th><th>Hadir</th><th>Susu</th>
    ${g.hasKopi ? '<th class="jatah-head">Kopi</th>' : ''}
    ${g.hasMie  ? '<th class="jatah-head">Mie</th>'  : ''}
  </tr></thead><tbody>`;
  html += buildRekapRows(g.list, g.hasKopi, g.hasMie);
  html += `<tr class="subtotal"><td colspan="3">Total</td><td>${g.susu}</td>
    ${g.hasKopi ? `<td>${g.kopi}</td>` : ''}
    ${g.hasMie  ? `<td>${g.mie}</td>`  : ''}
    </tr></tbody></table></div>`;
  return html;
}

        <option value="1" ${mf.shift==='1'?'selected':''}>Shift 1</option>
        <option value="2" ${mf.shift==='2'?'selected':''}>Shift 2</option>
        <option value="3" ${mf.shift==='3'?'selected':''}>Shift 3</option>
      </select></div>
      <button class="btn btn-primary" id="btn-buat-mandor" onclick="buatAkunMandor()">+ Buat Akun</button>
    </div>
    <div class="err-msg" id="mandor-err" style="margin-bottom:1rem"></div>
    <div class="slbl">Daftar Akun Mandor</div>
    <div class="table-wrap">
    <table><thead><tr><th>#</th><th>Nama</th><th>Username</th><th>Workcenter</th><th>Shift</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

// ============================================================
// EVENTS
// ============================================================
function attachEvents() {
  // Checkbox hadir
  document.querySelectorAll('input[data-kid]').forEach(cb => {
    cb.addEventListener('change', async function() {
      const kid = cb.dataset.kid, day = parseInt(cb.dataset.day);
      if (!state.kehadiran[kid]) state.kehadiran[kid] = {};
      if (!state.kehadiran[kid][state.week])
        state.kehadiran[kid][state.week] = [false,false,false,false,false,false,false];
      state.kehadiran[kid][state.week][day] = cb.checked;

      // Update totals inline
      const n = state.kehadiran[kid][state.week].filter(Boolean).length;
      const totEl  = document.getElementById('tot-'  + kid);
      const kopiEl = document.getElementById('kopi-' + kid);
      const mieEl  = document.getElementById('mie-'  + kid);
      const kar    = state.karyawan.find(k => k.id === kid);
      if (totEl)  totEl.textContent  = n;
      if (kopiEl) kopiEl.textContent = (kar && kar.dapat_kopi) ? n : '-';
      if (mieEl)  mieEl.textContent  = (kar && kar.dapat_mie)  ? n : '-';

      // Save to Supabase (non-blocking)
      await saveHadir(kid, day, cb.checked);
    });
  });

  // Enter key on login
  document.querySelectorAll('#l-username, #l-email, #l-pass').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('l-username')) doLoginMandor();
      else doLoginSuper();
    });
  });
}

async function buatAkunMandor() {
  const nama     = document.getElementById('m-nama').value.trim();
  const username = document.getElementById('m-username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
  const pass     = document.getElementById('m-pass').value;
  const wc       = document.getElementById('m-wc').value;
  const shift    = parseInt(document.getElementById('m-shift').value);
  const errEl    = document.getElementById('mandor-err');
  const btn      = document.getElementById('btn-buat-mandor');

  if (!nama || !username || !pass) { errEl.textContent = 'Nama, username, dan password wajib diisi'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password minimal 6 karakter'; return; }

  errEl.textContent = '';
  btn.textContent = 'Membuat...'; btn.disabled = true;

  // Konversi username ke fake email untuk Supabase Auth
  const fakeEmail = toFakeEmail(username);

  // Buat auth user via client terpisah dengan persistSession: false
  // agar session superadmin di localStorage tidak ketimpa
  const sbTemp = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: false, autoRefreshToken: false }
  });
  const { data: signUpData, error: signUpErr } = await sbTemp.auth.signUp({ email: fakeEmail, password: pass });
  if (signUpErr && !signUpErr.message.includes('already registered')) {
    errEl.textContent = 'Gagal buat akun: ' + signUpErr.message;
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  // Kalau signUp tidak beri session (email confirmation masih ON),
  // atau user sudah ada sebelumnya — coba signIn langsung
  let session = signUpData?.session;
  let uid = signUpData?.user?.id;
  if (!session) {
    const { data: siData, error: siErr } = await sbTemp.auth.signInWithPassword({ email: fakeEmail, password: pass });
    if (siErr || !siData.session) {
      errEl.textContent = 'Matikan "Confirm email" di Supabase: Authentication → Sign In / Providers → Email → toggle OFF "Confirm email"';
      btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
    }
    session = siData.session;
    uid = siData.user.id;
  }

  if (!uid) {
    errEl.textContent = 'User ID tidak ditemukan, coba lagi';
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  // Simpan profil mandor pakai sbTemp (login sebagai mandor itu sendiri)
  // sehingga RLS policy "user insert own profile" (auth.uid() = id) terpenuhi
  const { error: profErr } = await sbTemp.from('profiles').upsert({
    id: uid, nama, username, role: 'mandor', workcenter: wc, shift
  });
  if (profErr) {
    errEl.textContent = 'Akun dibuat tapi profil gagal: ' + profErr.message;
    btn.textContent = '+ Buat Akun'; btn.disabled = false; return;
  }

  showToast(`Akun mandor "${nama}" (${username}) berhasil dibuat!`);
  state.mandorForm = { nama: '', username: '', password: '', workcenter: 'Assembling', shift: '1' };
  btn.textContent = '+ Buat Akun'; btn.disabled = false;
  await loadMandors();
  render();
}

async function deleteMandor(id) {
  if (!confirm('Hapus akun mandor ini?')) return;
  const { error } = await sb.from('profiles').delete().eq('id', id);
  if (error) { showToast('Gagal hapus: ' + error.message); return; }
  showToast('Akun mandor dihapus');
  await loadMandors();
  render();
}

function downloadCSV() {
  let list = [...state.karyawan];
  let filename = `rekap-jatah-${state.week}`;
  if (state.role === 'mandor') {
    list = list.filter(k => k.lokasi === state.mandorWC && k.shift === state.mandorShift);
    filename = `rekap-${state.mandorWC}-shift${state.mandorShift}-${state.week}`;
  }
  list.sort((a,b) => {
    if (a.lokasi !== b.lokasi) return a.lokasi.localeCompare(b.lokasi);
    if (a.shift  !== b.shift)  return a.shift - b.shift;
    if (a.tipe   !== b.tipe)   return a.tipe.localeCompare(b.tipe);
    return a.nama.localeCompare(b.nama);
  });
  const days = [0,1,2,3,4,5,6].map(i => addDays(state.week, i));
  const dayLabels = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map((d,i) => d + ' ' + fmt(days[i]));
  const headers = ['Nama','Tipe','Shift','Lokasi',...dayLabels,'Total Hadir','Jatah Susu','Jatah Kopi','Jatah Mie'];
  const rows = list.map(k => {
    const h = getHadir(k.id), n = h.filter(Boolean).length;
    return [
      k.nama, k.tipe, `Shift ${k.shift}`, k.lokasi,
      ...h.map(v => v ? '1' : '0'),
      n,
      k.dapat_susu ? n : 0,
      k.dapat_kopi ? n : 0,
      k.dapat_mie  ? n : 0,
    ];
  });
  const csv = '\uFEFF' + [headers, ...rows]
    .map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
    .join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSV berhasil didownload');
}

// ---- PWA INSTALL PROMPT ----
let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');
const installClose  = document.getElementById('install-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Tampilkan banner langsung
  installBanner.classList.add('show');
  // Tampilkan tombol di home jika sedang di home
  const row = document.getElementById('pwa-install-row');
  if (row) row.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
  if (outcome === 'accepted') showToast('App berhasil diinstall!');
});

installClose.addEventListener('click', () => {
  installBanner.classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
  deferredPrompt = null;
  showToast('App berhasil diinstall!');
});

function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(({ outcome }) => {
      deferredPrompt = null;
      installBanner.classList.remove('show');
      if (outcome === 'accepted') {
        showToast('App berhasil diinstall!');
        const row = document.getElementById('pwa-install-row');
        if (row) row.style.display = 'none';
      }
    });
  } else {
    // Fallback: instruksi manual
    showToast('Klik ikon ⊕ di address bar browser untuk install', 4000);
  }
}

// Sembunyikan tombol install kalau sudah jalan sebagai PWA (standalone)
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.addEventListener('DOMContentLoaded', () => {
    const row = document.getElementById('pwa-install-row');
    if (row) row.style.display = 'none';
  });
}
